# Fly.io Deployment Example
# Best for: Docker containers, persistent storage, full-stack apps

name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io
        run: |
          flyctl deploy --app ${{ secrets.FLY_APP_NAME }} --token ${{ secrets.FLY_API_TOKEN }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# Required GitHub Secrets:
# FLY_API_TOKEN - From 'flyctl auth token'
# FLY_APP_NAME - Your Fly.io app name

# Setup commands (run locally first):
# 1. curl -L https://fly.io/install.sh | sh
# 2. flyctl auth login
# 3. flyctl apps create my-app
# 4. flyctl deploy (to create Dockerfile.toml)
# 5. Add secrets to GitHub